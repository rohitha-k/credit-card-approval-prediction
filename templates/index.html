<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Credit Card Approval Prediction</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <div class="title">
        <h1>Credit Card Approval Prediction</h1>

        <p>Fill the applicant details below</p>
      </div>

      <form action="/predict" method="POST">
        <div class="form-grid">
          <!-- Gender -->
          <div class="input-box">
            <label>Gender</label>
            <select name="CODE_GENDER" required>
              <option value="">Select</option>
              <option value="M">Male</option>
              <option value="F">Female</option>
            </select>
          </div>

          <!-- Car -->
          <div class="input-box">
            <label>Own Car</label>
            <select name="FLAG_OWN_CAR">
              <option value="Y">Yes</option>
              <option value="N">No</option>
            </select>
          </div>

          <!-- House -->
          <div class="input-box">
            <label>Own House</label>
            <select name="FLAG_OWN_REALTY">
              <option value="Y">Yes</option>
              <option value="N">No</option>
            </select>
          </div>

          <!-- Income -->
          <div class="input-box">
            <label>Annual Income</label>
            <input
              type="number"
              name="AMT_INCOME_TOTAL"
              placeholder="Enter Income"
              required
            />
          </div>

          <!-- Age -->
          <div class="input-box">
            <label>Age</label>
            <input type="number" name="AGE" min="18" max="100" required />
          </div>

          <!-- Employment -->
          <div class="input-box">
            <label>Years Employed</label>
            <input type="number" name="YEARS_EMPLOYED" min="0" required />
          </div>

          <!-- Children -->
          <div class="input-box">
            <label>Children</label>
            <input type="number" name="CNT_CHILDREN" value="0" min="0" />
          </div>

          <!-- Family Members -->
          <div class="input-box">
            <label>Family Members</label>
            <input type="number" name="CNT_FAM_MEMBERS" step="0.1" required />
          </div>

          <!-- Income Type -->
          <div class="input-box">
            <label>Income Type</label>
            <select name="NAME_INCOME_TYPE">
              <option value="Working">Working</option>

              <option value="Commercial associate">Commercial associate</option>

              <option value="Pensioner">Pensioner</option>

              <option value="State servant">State servant</option>

              <option value="Student">Student</option>
            </select>
          </div>

          <!-- Education -->
          <div class="input-box">
            <label>Education</label>
            <select name="NAME_EDUCATION_TYPE">
              <option value="Secondary / secondary special">Secondary</option>

              <option value="Higher education">Higher Education</option>

              <option value="Incomplete higher">Incomplete Higher</option>

              <option value="Lower secondary">Lower Secondary</option>

              <option value="Academic degree">Academic Degree</option>
            </select>
          </div>

          <!-- Family Status -->
          <div class="input-box">
            <label>Family Status</label>
            <select name="NAME_FAMILY_STATUS">
              <option value="Married">Married</option>

              <option value="Single / not married">Single</option>

              <option value="Civil marriage">Civil Marriage</option>

              <option value="Separated">Separated</option>

              <option value="Widow">Widow</option>
            </select>
          </div>

          <!-- Housing -->
          <div class="input-box">
            <label>Housing Type</label>
            <select name="NAME_HOUSING_TYPE">
              <option value="House / apartment">House / Apartment</option>

              <option value="With parents">With Parents</option>

              <option value="Municipal apartment">Municipal Apartment</option>

              <option value="Rented apartment">Rented Apartment</option>

              <option value="Office apartment">Office Apartment</option>

              <option value="Co-op apartment">Co-op Apartment</option>
            </select>
          </div>

          <!-- Occupation -->
          <div class="input-box">
            <label>Occupation</label>

            <select name="OCCUPATION_TYPE">
              <option value="Unknown">Unknown</option>

              <option value="Laborers">Laborers</option>

              <option value="Core staff">Core staff</option>

              <option value="Managers">Managers</option>

              <option value="Drivers">Drivers</option>

              <option value="Sales staff">Sales Staff</option>

              <option value="High skill tech staff">
                High Skill Tech Staff
              </option>

              <option value="Medicine staff">Medicine Staff</option>

              <option value="Security staff">Security Staff</option>

              <option value="Cooking staff">Cooking Staff</option>

              <option value="Cleaning staff">Cleaning Staff</option>

              <option value="Private service staff">
                Private Service Staff
              </option>

              <option value="Low-skill Laborers">Low Skill Laborers</option>

              <option value="Waiters/barmen staff">Waiters/Barmen Staff</option>

              <option value="Secretaries">Secretaries</option>

              <option value="HR staff">HR Staff</option>

              <option value="Realty agents">Realty Agents</option>

              <option value="IT staff">IT Staff</option>
            </select>
          </div>

          <!-- Work Phone -->
          <div class="input-box">
            <label>Work Phone</label>

            <select name="FLAG_WORK_PHONE">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <!-- Phone -->
          <div class="input-box">
            <label>Phone</label>

            <select name="FLAG_PHONE">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <!-- Email -->
          <div class="input-box">
            <label>Email</label>

            <select name="FLAG_EMAIL">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>
        </div>

        <div class="button">
          <input type="submit" value="Predict Approval" />
        </div>
      </form>
    </div>
  </body>
</html>
